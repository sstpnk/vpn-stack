version: '3.8'

services:
  wg-easy:
    image: ghcr.io/spcfox/amnezia-wg-easy:latest
    container_name: vpn-awg-easy
    restart: unless-stopped
    environment:
      - LANG=ru
      - WG_HOST=${WG_HOST:-YOUR_SERVER_IP}
      - PASSWORD=${WG_EASY_PASSWORD:-YOUR_PASSWORD}
      - UI_TRAFFIC_STATS=true
    volumes:
      - ./data/wg-easy:/etc/wireguard
    ports:
      - "${WG_PORT:-51820}:51820/udp"
      - "51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun

  xray:
    image: teddysun/xray:latest
    container_name: vpn-xray
    restart: unless-stopped
    ports:
      - "${XRAY_PORT:-443}:443/tcp"
    volumes:
      - ./xray-config/config.template.json:/etc/xray/config.json:ro

  vpn-bot:
    build: ./bot
    container_name: vpn-bot
    restart: unless-stopped
    env_file:
      - ./bot/.env.template
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    network_mode: host
    depends_on:
      - wg-easy
