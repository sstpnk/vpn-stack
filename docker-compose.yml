services:
  wg-easy:
    build: ./awg-easy
    image: vpn-stack/amnezia-wg-easy:local
    container_name: vpn-awg-easy
    restart: unless-stopped
    environment:
      - LANG=ru
      - WG_HOST=${WG_HOST}
      - WG_PORT=${WG_PORT:-51820}
      - WG_MTU=${WG_MTU:-1280}
      - WG_ALLOWED_IPS=${WG_ALLOWED_IPS:-}
      - WG_PERSISTENT_KEEPALIVE=${WG_PERSISTENT_KEEPALIVE:-25}
      - PASSWORD=${WG_EASY_PASSWORD}
      - UI_TRAFFIC_STATS=true
      - JC=${AMNEZIA_JC:-10}
      - JMIN=${AMNEZIA_JMIN:-64}
      - JMAX=${AMNEZIA_JMAX:-200}
      - S1=${AMNEZIA_S1:-64}
      - S2=${AMNEZIA_S2:-64}
      - H1=${AMNEZIA_H1:-1000-12999}
      - H2=${AMNEZIA_H2:-13000-24999}
      - H3=${AMNEZIA_H3:-25000-36999}
      - H4=${AMNEZIA_H4:-37000-50000}
      - I1=${AMNEZIA_I1:-<b 0x160301>}
      - I2=${AMNEZIA_I2:-<r 3><b 0x0303><r 32>}
      - I3=${AMNEZIA_I3:-<b 0x00><r 5>}
      - I4=${AMNEZIA_I4:-<r 40>}
      - I5=${AMNEZIA_I5:-<b 0xC0000000><r 8><b 0x04><r 100>}
    volumes:
      - ./data/wg-easy:/etc/wireguard
    ports:
      - "${WG_PORT:-51820}:${WG_PORT:-51820}/udp"
      - "51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun

  xray:
    image: teddysun/xray:latest
    container_name: vpn-xray
    restart: unless-stopped
    ports:
      - "${XRAY_PORT:-443}:443/tcp"
    volumes:
      - ./xray-config/config.json:/etc/xray/config.json:ro

  vpn-bot:
    build: ./bot
    container_name: vpn-bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ALLOWED_USERNAMES=${ALLOWED_USERNAMES}
      - WG_EASY_URL=http://wg-easy:51821
      - WG_EASY_PASSWORD=${WG_EASY_PASSWORD}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - wg-easy
