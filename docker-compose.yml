version: '3.8'

services:
  wg-easy:
    image: ghcr.io/spcfox/amnezia-wg-easy:latest
    container_name: vpn-awg-easy
    restart: unless-stopped
    environment:
      - LANG=ru
      - WG_HOST=${WG_HOST}
      - PASSWORD=${WG_EASY_PASSWORD}
      - UI_TRAFFIC_STATS=true
    volumes:
      - ./data/wg-easy:/etc/wireguard
    ports:
      - "${WG_PORT:-51820}:51820/udp"
      - "51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun

  xray:
    image: teddysun/xray:latest
    container_name: vpn-xray
    restart: unless-stopped
    ports:
      - "${XRAY_PORT:-443}:443/tcp"
    volumes:
      - ./xray-config/config.template.json:/etc/xray/config.json:ro

  vpn-bot:
    build: ./bot
    container_name: vpn-bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ALLOWED_USERNAMES=${ALLOWED_USERNAMES}
      - WG_EASY_URL=http://wg-easy:51821
      - WG_EASY_PASSWORD=${WG_EASY_PASSWORD}
      - WG_MTU=${WG_MTU:-1280}
      - AMNEZIA_JC=${AMNEZIA_JC:-9}
      - AMNEZIA_JMIN=${AMNEZIA_JMIN:-50}
      - AMNEZIA_JMAX=${AMNEZIA_JMAX:-1000}
      - AMNEZIA_S1=${AMNEZIA_S1:-33}
      - AMNEZIA_S2=${AMNEZIA_S2:-18}
      - AMNEZIA_H1=${AMNEZIA_H1:-1556852380}
      - AMNEZIA_H2=${AMNEZIA_H2:-854724827}
      - AMNEZIA_H3=${AMNEZIA_H3:-1373297535}
      - AMNEZIA_H4=${AMNEZIA_H4:-1443617385}
      - AMNEZIA_I1=${AMNEZIA_I1:-4}
      - AMNEZIA_I2=${AMNEZIA_I2:-4}
      - AMNEZIA_I3=${AMNEZIA_I3:-3}
      - AMNEZIA_I4=${AMNEZIA_I4:-0}
      - AMNEZIA_I5=${AMNEZIA_I5:-0}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - wg-easy
