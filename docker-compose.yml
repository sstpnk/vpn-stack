services:
  wg-easy:
    build: ./awg-easy
    image: vpn-stack/amnezia-wg-easy:local
    container_name: vpn-awg-easy
    restart: unless-stopped
    environment:
      - LANG=ru
      - WG_HOST=${WG_HOST}
      - WG_PORT=${WG_PORT:-51820}
      - WG_MTU=${WG_MTU:-1280}
      - WG_ALLOWED_IPS=${WG_ALLOWED_IPS:-}
      - PASSWORD=${WG_EASY_PASSWORD}
      - UI_TRAFFIC_STATS=true
      - JC=${AMNEZIA_JC:-9}
      - JMIN=${AMNEZIA_JMIN:-50}
      - JMAX=${AMNEZIA_JMAX:-1000}
      - S1=${AMNEZIA_S1:-33}
      - S2=${AMNEZIA_S2:-18}
      - H1=${AMNEZIA_H1:-1556852380}
      - H2=${AMNEZIA_H2:-854724827}
      - H3=${AMNEZIA_H3:-1373297535}
      - H4=${AMNEZIA_H4:-1443617385}
      - I1=${AMNEZIA_I1:-4}
      - I2=${AMNEZIA_I2:-4}
      - I3=${AMNEZIA_I3:-3}
      - I4=${AMNEZIA_I4:-0}
      - I5=${AMNEZIA_I5:-0}
    volumes:
      - ./data/wg-easy:/etc/wireguard
    ports:
      - "${WG_PORT:-51820}:${WG_PORT:-51820}/udp"
      - "51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun

  xray:
    image: teddysun/xray:latest
    container_name: vpn-xray
    restart: unless-stopped
    ports:
      - "${XRAY_PORT:-443}:443/tcp"
    volumes:
      - ./xray-config/config.json:/etc/xray/config.json:ro

  vpn-bot:
    build: ./bot
    container_name: vpn-bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ALLOWED_USERNAMES=${ALLOWED_USERNAMES}
      - WG_EASY_URL=http://wg-easy:51821
      - WG_EASY_PASSWORD=${WG_EASY_PASSWORD}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - wg-easy
